<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Holiday Guide Article | RajGov Calendar</title>
  <meta name="description" content="Read the latest Rajasthan holiday guide and official updates in a semantic, crawlable article layout.">
  <link rel="stylesheet" href="../styles.css">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="site-shell bg-raj-sand text-gray-800">
  <div id="header-container"></div>

  <main class="flex-1 py-12">
    <div class="max-w-5xl mx-auto px-4 sm:px-6">
      <article class="section-card rounded-3xl p-8 md:p-10">
        <div class="mb-6 rounded-2xl hero-accent p-5">
          <p id="article-meta" class="text-sm font-semibold uppercase tracking-[0.2em] text-raj-pink"></p>
          <h1 id="article-title" class="mt-3 text-3xl md:text-4xl font-bold text-gray-900"></h1>
        </div>
        <div id="article-not-found" class="hidden rounded-2xl border border-dashed border-gray-300 bg-gray-50 p-6 text-gray-600">
          The article you requested could not be found. Please return to the homepage and choose another guide.
        </div>
        <div id="article-content" class="prose max-w-none"></div>
      </article>
    </div>
  </main>

  <div id="footer-container"></div>

  <script src="../app.js"></script>
  <script src="../js/components.js"></script>
</body>
</html>
