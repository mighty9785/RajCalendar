<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us | Rajasthan Calendar</title>
  <meta name="description" content="Contact RajGov Calendar for holiday updates, feedback, or content-related inquiries.">
  <link rel="stylesheet" href="../styles.css">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="site-shell bg-raj-sand text-gray-800">
  <div id="header-container"></div>

  <main class="flex-1 py-16">
    <div class="max-w-4xl mx-auto px-4 sm:px-6">
      <article class="section-card rounded-3xl p-8 md:p-10">
        <h1 class="text-3xl font-bold text-gray-900">Contact Us</h1>
        <p class="mt-4 text-gray-600">For feedback, updates, or content suggestions, please use the details below.</p>
        <div class="mt-8 rounded-2xl bg-gray-50 p-6">
          <p class="text-gray-700">Email: info@rajcalendar.in</p>
          <p class="text-gray-700 mt-2">Website: rajcalendar.in</p>
          <p class="text-gray-700 mt-2">Please allow a few business days for a response.</p>
        </div>
      </article>
    </div>
  </main>

  <div id="footer-container"></div>
  <script src="../js/components.js"></script>
</body>
</html>
